#game-viewport {

    .gradient-text {
    background: linear-gradient(90deg, #ff4d4d, #ffa64d, #ffff4d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
    @keyframes shake {
  0% { transform: translate(1px, 1px) rotate(0deg); }
  10% { transform: translate(-1px, -2px) rotate(-1deg); }
  30% { transform: translate(3px, 2px) rotate(0deg); }
  50% { transform: translate(-1px, 2px) rotate(1deg); }
  70% { transform: translate(3px, 1px) rotate(-1deg); }
  100% { transform: translate(1px, -2px) rotate(0deg); }
}

.effect-shake {
    display: inline-block;
    animation: shakeChar 0.1s infinite;
}

@keyframes shakeChar {
    0% { transform: translate(0px, 0px); }
    25% { transform: translate(2px, -1px); }
    50% { transform: translate(-1px, 2px); }
    75% { transform: translate(1px, -2px); }
    100% { transform: translate(0px, 0px); }
}

.effect-wave {
    display: inline-block;
    animation: waveChar 1.5s infinite ease-in-out;
}

@keyframes waveChar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

                element = new Image();
                element.onload = resolve;
                element.src = src;
            } else {
                element = new Audio();
                element.oncanplaythrough = resolve;
                element.src = src;
                element.load();
            }
        });

    function startTypewriter(text, element, speaker = null, effect = null, onFinish = null, muted = false) {
  clearTimeout(_typingTimeout); 
  _isTyping = true;
  _fullTextToDisplay = text;
  _currentSpeaker = speaker;
  _currentEffect = effect;
  _currentOnFinish = onFinish;

  const speedMap = { 0: 60, 1: 30, 2: 10, 3: 0 };
  const config = speakerConfigs[speaker] || speakerConfigs['default'];
  const baseSpeed = speedMap[settings.speed];

  const charSound = new Audio(config.sound);
  charSound.volume = 0.5;

  let i = 0;
  element.innerHTML = "";

  function type() {
    if (i < text.length) {
      const char = text.charAt(i);
      const nextChar = text.charAt(i + 1);
      
      const span = document.createElement('span');
      span.className = 'dialog-char';
      span.textContent = char;
      
      if (effect === 'shaky') span.classList.add('effect-shake');
      if (effect === 'sine' || effect === 'wave') {
          span.classList.add('effect-wave');
          span.style.animationDelay = (i * 0.1) + 's';
      }
      
      element.appendChild(span);

      if (!muted && i % config.frequency === 0 && char !== " ") {
        const playClone = charSound.cloneNode();
        playClone.playbackRate = config.pitch;
        playClone.play().catch(e => {});
      }

      let currentDelay = baseSpeed;
      if (char === "." || char === "!" || char === "?") {
          if (nextChar !== "." && nextChar !== "!" && nextChar !== "?") {
              currentDelay += 500; 
          }
      } else if (char === ",") {
          currentDelay += 250;
      }

      i++;
      _typingTimeout = setTimeout(type, currentDelay);
    } else {
      finishTyping(element, onFinish);
    }
  }

  type();
}

    function finishTyping(element, onFinish = null) {
  clearTimeout(_typingTimeout);
  _isTyping = false;
  
  element.innerHTML = "";
  for (let i = 0; i < _fullTextToDisplay.length; i++) {
    const span = document.createElement('span');
    span.className = 'dialog-char';
    span.textContent = _fullTextToDisplay[i];
    if (_currentEffect === 'shaky') span.classList.add('effect-shake');
    if (_currentEffect === 'sine' || _currentEffect === 'wave') {
        span.classList.add('effect-wave');
        span.style.animationDelay = (i * 0.1) + 's';
    }
    if (_currentEffect === 'glitch') span.classList.add('effect-glitch');
    element.appendChild(span);
  }
  if (onFinish) onFinish();
}

function normalizeDialogLines(input, defaultStyle) {
  const rawLines = Array.isArray(input) ? input : [input];

  return rawLines.map(line => {
    if (typeof line === 'string') {
      return { 
        text: line, 
        speaker: null, mood: null, position: 'center',
        style: defaultStyle || 'dialog', triggers: [], choices: [] 
      };
    }
    return {
      speaker: line.speaker || null,
      mood: line.mood || null,
      position: line.position || 'center',
      text: line.text !== undefined ? String(line.text) : '',
      style: line.style || defaultStyle || 'dialog',
      effect: line.effect || null,
      background: line.background || null,
      ambience: line.ambience || null,
      track: line.track || null,
      triggers: line.triggers || [],
        next: line.next || null,
      branches: line.branches || null,
      newChapter: line.newChapter || false,
      choices: line.choices || []
    };
  });
}

    function handleTrigger(trig) {

            break;
        case "shake":

            setTimeout(() => { document.body.style.animation = "shake 0.5s"; }, 10);
            break;
        case "flash":
            const fx = document.getElementById("fade-overlay");
            fx.style.transition = "none";
            fx.style.background = "white";
            fx.style.opacity = 1;
            setTimeout(() => {
                fx.style.transition = "opacity 0.5s ease";
                fx.style.opacity = 0;
            }, 50);
            break;
            case "silent":
            if (_currentAmbience) {
                _currentAmbience.pause();
                _currentAmbience = null;
            }
            if (_currentTrack) {
                _currentTrack.pause();
                _currentTrack = null;
            }
            break;
            case "branch":
        handleBranch(trig);
        break;
            case "giveItem":
            if (inFreeplay) break;
    inventory.set(trig.key, (inventory.get(trig.key) || 0) + trig.value);
    break;

case "takeItem":
            if (inFreeplay) break;
    inventory.set(trig.key, Math.max(0, (inventory.get(trig.key) || 0) - trig.value));
    break;

case "requireItem":
    if (!inventory.get(trig.key)) {
    }
    break;
            case "song":
            startSong(trig.value);
            break;
        case "flag":
            if (inFreeplay) break;
            gameFlags[trig.key] = trig.value;
            break;
        case "meter":
            if (inFreeplay) break;
            meters[trig.key] += trig.value;
            console.log(`${trig.key} is now ${meters[trig.key]}`);
            break;
    }
}

function handleBranch(trig) {
    const condition = trig.flag ? gameFlags[trig.flag] : null;
    const meterValue = trig.meter ? meters[trig.meter] : null;

    let goTo = null;

    if (trig.flag) {
        goTo = condition ? trig.ifTrue : trig.ifFalse;
    } else if (trig.meter) {
        goTo = meterValue >= trig.min ? trig.ifTrue : trig.ifFalse;
    }

    if (goTo) {
        console.log("Branching to:", goTo);
        loadDialogue(goTo);
    }
}

function playBgMusic(type, data) {
    if (!data) return;

    let current = (type === 'ambience') ? _currentAmbience : _currentTrack;
    
    if (current && current.dataset.src === data.src) {
        current.volume = data.volume || 1.0;
        return;
    }

    if (current) {
        current.pause();
        current.remove();
    }

    const audio = new Audio(data.src);
    audio.loop = true;
    audio.volume = data.volume || 1.0;
    audio.dataset.src = data.src;
    audio.play().catch(e => console.error("play audio fuckass", e));

    if (type === 'ambience') _currentAmbience = audio;
    else _currentTrack = audio;
}

    if (action.meter) meters[action.meter] += action.value;
    if (action.sfx) new Audio(action.sfx).play().catch(e => {});

    }
}

function showChoices(choices) {
    const container = document.getElementById("choice-container");
    container.innerHTML = "";
    container.style.display = "flex";
    
    clearTimeout(_qteTimer);

    const qteChoice = choices.find(c => c.timer);
    if (qteChoice) {
        _qteTimer = setTimeout(() => {
            container.style.display = "none";
            handleAction(qteChoice.onFail);
        }, qteChoice.timer);
    }

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.className = "choice-btn";
        btn.textContent = choice.text;
        btn.onclick = () => {
            clearTimeout(_qteTimer);
            container.style.display = "none";
            handleAction(choice.onSelect);
        };
        container.appendChild(btn);
    });
}
    
function showDialog(lines, opts = {}) {
    _dialogQueue = normalizeDialogLines(lines, opts.style);
    document.getElementById("dialog-box").style.display = "block";
    document.getElementById("dialog-background").style.display = "block";
    
    if (_dialogQueue.length > 0) {
        renderLine(_dialogQueue.shift());
    }
}



function closeDialog() {
  const textDiv = document.getElementById("dialog-text");
  const box = document.getElementById("dialog-box");
  const bg = document.getElementById("dialog-background");
  const activeSprite = document.querySelector(".char.visible");
  if (activeSprite) {
    activeSprite.classList.remove("visible");
  }

  textDiv.innerHTML = "";
  box.style.display = "none";
  bg.style.display = "none";

  _isTyping = false;
  clearInterval(_typingTimeout);

  if (typeof draw === "function") draw();
}

const textBox = new Audio("sfx/textboxClick.mp3");

document.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    if (_rhythmStarted) return;
    if (_isTyping) { finishTyping(document.getElementById("dialog-text")); return; }
    if (document.getElementById("choice-container").style.display === "flex") return;

    if (_dialogQueue.length > 0) {
      renderLine(_dialogQueue.shift());
    textBox.currentTime = 0;
    textBox.play();
      return;
    }
      
      
    if (_nextScene) {
        let sceneToLoad = _nextScene;
        _nextScene = null; 

        if (_isNewChapter) {
            _isNewChapter = false;
            await chapterComplete(sceneToLoad);
        } else {
            loadDialogue(sceneToLoad);
        }
    } else {
        closeDialog();
    }
  }
});

async function chapterComplete(nextScene) {
    const fade = document.getElementById("fade-overlay");
    const bg = document.getElementById("dialog-background");
    const box = document.getElementById("dialog-box");

    fade.style.opacity = 1;
    await new Promise(r => setTimeout(r, 1000));

    box.style.display = "none";
    bg.style.backgroundImage = "url('backgrounds/chaptercomplete.png')";
    bg.style.display = "block";
    
    saveChapter(nextScene);
    
    fade.style.opacity = 0;
    await new Promise(r => setTimeout(r, 3000));
    fade.style.opacity = 1;
    await new Promise(r => setTimeout(r, 1000));
    
    loadDialogue(nextScene);
    fade.style.opacity = 0;
}

const devConsole = document.getElementById("dev-console");
const devInput = document.getElementById("dev-input");

document.addEventListener("keydown", (e) => {
    if (e.key === "-") {
        e.preventDefault();
        const isVisible = devConsole.style.display === "block";
        devConsole.style.display = isVisible ? "none" : "block";
        if (!isVisible) devInput.focus();
    }
});

devInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
        doCommand(devInput.value);
        devInput.value = "";
        devConsole.style.display = "none";
    }
});

function doCommand(input) {
    const parts = input.trim().split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    switch (cmd) {
        case '/help':
            console.log("Commands: /show [scene], /give [item] [qty], /flag [key] [true/false], /meter [key] [val]");
            break;

        case '/show':
            console.log("Forcing dialogue:", args[0]);
            loadDialogue(args[0]);
            break;

        case '/give':
            const item = args[0];
            const qty = parseInt(args[1]) || 1;
            inventory.set(item, (inventory.get(item) || 0) + qty);
            console.log(`Inventory: ${item} is now ${inventory.get(item)}`);
            break;

        case '/flag':
            const key = args[0];
            const val = args[1] === "true";
            gameFlags[key] = val;
            console.log(`Flag ${key} set to ${val}`);
            break;

        case '/meter':
            const mKey = args[0];
            const mVal = parseInt(args[1]);
            meters[mKey] = mVal;
            console.log(`Meter ${mKey} set to ${mVal}`);
            break;

        default:
            console.log("Unknown command. Type /help");
    }
}

const CHAPTER_SAVE_KEY = 'fnf_dark_minds_chapter_save';
const SCENE_SAVE_KEY = 'fnf_dark_minds_scene_save';

function getGame(sceneName) {
    return {
        currentScene: sceneName,
        flags: { ...gameFlags },
        meters: { ...meters },
        inventory: Object.fromEntries(inventory),
        timestamp: new Date().toLocaleTimeString()
    };
}

function saveScene(sceneName) {
    localStorage.setItem(SCENE_SAVE_KEY, JSON.stringify(getGame(sceneName)));
    console.log("Current Scene Saved:", sceneName);
}

function saveChapter(sceneName) {
    localStorage.setItem(CHAPTER_SAVE_KEY, JSON.stringify(getGame(sceneName)));
    console.log("Chapter Milestone Saved:", sceneName);
}
    
    function saveGame(sceneName) {
    const saveData = {
        currentScene: sceneName,
        flags: gameFlags,
        meters: meters,
        inventory: Object.fromEntries(inventory)
    };
    localStorage.setItem('fnf_dark_minds_save', JSON.stringify(saveData));
    console.log("Game Saved at:", sceneName);
}

function loadGameData() {
    const raw = localStorage.getItem('fnf_dark_minds_save');
    if (!raw) return null;
    
    const data = JSON.parse(raw);
    gameFlags = data.flags;
    meters = data.meters;
    inventory = new Map(Object.entries(data.inventory));
    return data.currentScene;
}

function resetGame() {
    gameFlags = { placeholder: false, place: false };
    meters = { toxic: 0, stamina: 100, sanity: 100, picolove: 50, keithlove: 50 };
    inventory = new Map([["guns", 2], ["ammo", 1], ["importantthings", 0]]);
    localStorage.removeItem('fnf_dark_minds_save');
}
    
function draw() {
    //nothing
}
let hp = 100;
const maxHP = 200;

let camera = {
    x: 0,
    y: 1000,
    targetX: 0,
    targetY: 0,
    zoom: 1,
    targetZoom: 1,
    lerpSpeed: 0.05,
    zoomSpeed: 0.05,
    bounds: { width: 2048, height: 1500 },
    viewport: { width: 1595, height: 1099 }
};

let _activeSong = null;
let _inst = null;
let _voicePlayer = null;
let _voiceOpponent = null;
let _rhythmStarted = false;
let _playerChar = null;
let _opponentChar = null;
let _currentPlayerChar = "bf";
let _currentOpponentChar = "gf";
let _playerSprite = null;
let _opponentSprite = null;

let _playerCanvas = document.getElementById("playerCanvas");
let _playerCtx = _playerCanvas.getContext("2d");

let _opponentCanvas = document.getElementById("opponentCanvas");
let _opponentCtx = _opponentCanvas.getContext("2d");

let _playerKey = null; 
window.addEventListener("keydown", e => _playerKey = e.key.toUpperCase());
window.addEventListener("keyup", () => _playerKey = null);

const CHARACTER_DATA = {
    bf: {
        src: "assets/final/bf-sprit.png",
        frameWidth: 500,
        frameHeight: 500,
        columns: 4,
        playable: true
    },

    pico: {
        src: "assets/final/pico-sprite.png",
        frameWidth: 500,
        frameHeight: 500,
        columns: 4,
        playable: true
    },

    gf: {
        src: "assets/final/gf-sprite.png",
        frameWidth: 800,
        frameHeight: 800,
        columns: 4,
        playable: false
    }
};

const IDLE_FRAMES = [0, 1, 2, 3, 4];
const PLAYER_KEY_FRAMES = {
    "ARROWLEFT": 5,
    "ARROWUP": 6,
    "ARROWRIGHT": 7,
    "ARROWDOWN": 8
};

async function loadSongData(songId) {
    const base = `assets/final/songs/${songId}/`;
    const res = await fetch(base + "chart.json");
    if (!res.ok) {
        console.error("Failed to load chart.json for song:", songId);
        return null;
    }
    const json = await res.json();

    json.background = base + json.background;
    json.instSrc = base + json.instSrc;
    json.voicePlayer = base + json.voicePlayer;
    json.voiceOpponent = base + json.voiceOpponent;

    return json;
}

async function startSong(songId) {
    const data = await loadSongData(songId);
    if (!data) return;

    _activeSong = {
        background: data.background,
        bpm: data.bpm,
        scrollSpeed: data.scrollSpeed,
        player: data.player,
        opponent: data.opponent,
        opponentNotes: [...data.opponentNotes],
        playerNotes: [...data.playerNotes]
    };
    
    _rhythmStarted = true;
    
    const fade = document.getElementById("fade-overlay");
    const songLoading = document.getElementById("song-loading-screen");
    const stage = document.getElementById("rhythm-stage");
    const box = document.getElementById("dialog-box");
    const cam = document.getElementById("camera-container");
    const dialogBg = document.getElementById("dialog-background");

    _currentPlayerChar = data.player;
    _currentOpponentChar = data.opponent;

    _playerChar = CHARACTER_DATA[data.player];
    _opponentChar = CHARACTER_DATA[data.opponent];

    _playerSprite = new Image();
    _playerSprite.src = _playerChar.src;

    _opponentSprite = new Image();
    _opponentSprite.src = _opponentChar.src;

    fade.style.transition = "opacity 0.5s ease";
    fade.style.opacity = 1;
    await new Promise(r => setTimeout(r, 500));

    box.style.display = "none";
    songLoading.style.display = "block";

    fade.style.opacity = 0;
    await new Promise(r => setTimeout(r, 500));

    _inst = new Audio(data.instSrc);
    _voicePlayer = new Audio(data.voicePlayer);
    _voiceOpponent = new Audio(data.voiceOpponent)
    const waitForAudio = audio =>
        new Promise((resolve, reject) => {
            const onReady = () => resolve();
            const onError = () => reject(new Error("Audio failed to load: " + audio.src));

            audio.addEventListener("canplaythrough", onReady, { once: true });
            audio.addEventListener("error", onError, { once: true });

            audio.load();
        });

    try {
        await Promise.all([
            waitForAudio(_inst),
            waitForAudio(_voicePlayer),
            waitForAudio(_voiceOpponent)
        ]);
    } catch (err) {
        console.error(err);
        return;
    }

    fade.style.opacity = 1;
    await new Promise(r => setTimeout(r, 500));

    dialogBg.style.display = "none";
    
    stage.style.backgroundImage = `url("${data.background}")`;
    cam.style.display = "block"; 
    stage.style.display = "block";

    songLoading.style.display = "none";

    document.getElementById("icon-container").style.display = "block";
    document.getElementById("icon-player").style.display = "block";
    document.getElementById("icon-opponent").style.display = "block";
    document.getElementById("icon-player").src = `assets/final/icon${_currentPlayerChar}-neutral.png`;
    document.getElementById("icon-opponent").src = `assets/final/icon${_currentOpponentChar}-neutral.png`;

    document.getElementById("healthbar").style.display = "block";
    hp = 100;
    updateHPBar();

    setupReceptors();
    document.getElementById("rhythm-ui").style.display = "block";

    fade.style.opacity = 0;
    await new Promise(r => setTimeout(r, 500));

    await runCountdown();

    _inst.currentTime = 0;
    _voicePlayer.currentTime = 0;
    _voiceOpponent.currentTime = 0;

    const tryPlay = audio => audio.play().catch(() => {
    });

    tryPlay(_inst);
    tryPlay(_voicePlayer);
    tryPlay(_voiceOpponent);

    requestAnimationFrame(updateRhythmLoop);
}
    
function setupReceptors() {
    const opp = document.getElementById("opponent-lanes");
    const pla = document.getElementById("player-lanes");

    opp.innerHTML = "";
    pla.innerHTML = "";

    for (let i = 0; i < 4; i++) {
        const o = document.createElement("div");
        o.className = `receptor r-${i}`;
        o.style.animationDelay = `${i * 0.2}s`;
        opp.appendChild(o);

        const p = document.createElement("div");
        p.className = `receptor r-${i}`;
        p.style.animationDelay = `${(i + 4) * 0.2}s`;
        pla.appendChild(p);
    }
}
    
async function runCountdown() {
    const display = document.getElementById("countdown-display");
    const steps = ["3", "2", "1", "go"];
    for (let s of steps) {
        new Audio(`assets/final/${s}.mp3`).play();
        if (s !== "3") {
            display.innerHTML = `<img src="assets/final/${s}.png">`;
        }
        await new Promise(r => setTimeout(r, 500));
        display.innerHTML = "";
    }
}
    
function updateCamera() {
    camera.x += (camera.targetX - camera.x) * camera.lerpSpeed;
    camera.y += (camera.targetY - camera.y) * camera.lerpSpeed;
    
    camera.zoom += (camera.targetZoom - camera.zoom) * camera.zoomSpeed;

    const maxX = camera.bounds.width - (camera.viewport.width / camera.zoom);
    const maxY = camera.bounds.height - (camera.viewport.height / camera.zoom);
    camera.x = Math.max(0, Math.min(camera.x, maxX));
    camera.y = Math.max(0, Math.min(camera.y, maxY));

    const container = document.getElementById("camera-container");
    if (container) {
        container.style.transform = `scale(${camera.zoom}) translate3d(${-camera.x}px, ${-camera.y}px, 0)`;
    }
}

    function autoFocusCamera(currentTime) {
    const focus = 400;
    
    let opponentSinging = _activeSong.opponentNotes.some(n => n[0] > currentTime && n[0] < currentTime + focus);
    let playerSinging = _activeSong.playerNotes.some(n => n[0] > currentTime && n[0] < currentTime + focus);

    if (opponentSinging) {
        camera.targetX = 0; 
        camera.targetY = 1000;
        camera.targetZoom = 1.1;
    } else if (playerSinging) {
        camera.targetX = 600; 
        camera.targetY = 1000;
        camera.targetZoom = 1.2;
    } else {
        camera.targetX = 256;
        camera.targetY = 1000;
        camera.targetZoom = 1.0;
    }
}

function updateRhythmLoop() {

    if (!_rhythmStarted || !_inst) return;
    
    const currentTime = _inst.currentTime * 1000;
    const speed = _activeSong.scrollSpeed;
    animateCharacters(currentTime);
    updateHPBar(currentTime);
    updateCamera();
    autoFocusCamera(currentTime);

    [_activeSong.opponentNotes, _activeSong.playerNotes].forEach((list, index) => {
        const isPlayer = index === 1;
        for (let i = list.length - 1; i >= 0; i--) {
            const n = list[i];
            if (n[0] < currentTime + 2000) {
                createNoteElement(n, isPlayer);
                list.splice(i, 1);
            }
        }
    });

    const noteElements = document.querySelectorAll(".note");
    noteElements.forEach(el => {
        const targetTime = parseFloat(el.dataset.time);
        const diff = targetTime - currentTime;
        const y = 50 + (diff * speed);
        el.style.top = y + "px";

        if (diff < -200) el.remove();
    });

    const bodies = document.querySelectorAll(".sustain-body");
    bodies.forEach(el => {
        const headTime = parseFloat(el.dataset.time);
        const length = parseFloat(el.dataset.length);
        const diff = headTime - currentTime;

        const headY = 50 + (diff * speed);
        const height = length * speed;

        el.style.top = headY + "px";
        el.style.height = height + "px";

        if (diff < -length - 200) el.remove();
    });

    const ends = document.querySelectorAll(".sustain-end");
    ends.forEach(el => {
        const headTime = parseFloat(el.dataset.time);
        const length = parseFloat(el.dataset.length);
        const diff = headTime - currentTime;

        const headY = 50 + (diff * speed);
        const height = length * speed;

        const endHeight = 60;
        el.style.top = (headY + height - endHeight) + "px";

        if (diff < -length - 200) el.remove();
    });

    if (diff < -HIT_WINDOW && el.dataset.isplayer === "true") {
        hp = Math.max(0, hp - 10); 
        el.style.opacity = "0.3";
        el.dataset.isplayer = "false";
        updateHPBar(currentTime);
    }

    if (diff < -500) el.remove(); // Final cleanup

    requestAnimationFrame(updateRhythmLoop);
}

function createNoteElement(n, isPlayer) {
    const laneContainer = isPlayer
        ? document.getElementById("player-lanes")
        : document.getElementById("opponent-lanes");

    const time = n[0];
    const lane = n[1];
    const length = n[2];

    const note = document.createElement("div");
    note.className = "note";
    note.dataset.time = time;
    note.dataset.lane = lane;
    note.dataset.isplayer = isPlayer; 
    note.style.left = (lane * 152) + "px";
    note.style.backgroundImage = `url('assets/final/notes/arrow_${lane}.png')`;
    laneContainer.appendChild(note);

    if (length > 0) {

        const body = document.createElement("div");
        body.className = "sustain-body";
        body.dataset.time = time;
        body.dataset.length = length;
        body.style.left = (lane * 155) + "px";
        laneContainer.appendChild(body);

        const end = document.createElement("div");
        end.className = "sustain-end";
        end.dataset.time = time;
        end.dataset.length = length;
        end.style.left = (lane * 155) + "px";
        laneContainer.appendChild(end);
    }
}
    function drawCharacterFrame(ctx, img, charData, frameIndex) {
    const fw = charData.frameWidth;
    const fh = charData.frameHeight;
    const cols = charData.columns;

    const sx = (frameIndex % cols) * fw;
    const sy = Math.floor(frameIndex / cols) * fh;

    ctx.drawImage(img, sx, sy, fw, fh, 0, 0, fw, fh);
}

    function animateCharacters(currentTime) {
    const bpm = _activeSong.bpm;
    const ticksPerBeat = 10;
    const tickRate = (bpm / 60) * ticksPerBeat;
    const holdTicks = 4;

    const t = currentTime / 1000;
    const tick = Math.floor(t * tickRate);
    const idleFrame = Math.floor(tick / holdTicks) % IDLE_FRAMES.length;

    _playerCtx.clearRect(0, 0, _playerChar.frameWidth, _playerChar.frameHeight);

    if (_playerKey && PLAYER_KEY_FRAMES[_playerKey] !== undefined) {
        drawCharacterFrame(_playerCtx, _playerSprite, _playerChar, PLAYER_KEY_FRAMES[_playerKey]);
    } else {
        drawCharacterFrame(_playerCtx, _playerSprite, _playerChar, IDLE_FRAMES[idleFrame]);
    }

    _opponentCtx.clearRect(0, 0, _opponentChar.frameWidth, _opponentChar.frameHeight);
    drawCharacterFrame(_opponentCtx, _opponentSprite, _opponentChar, IDLE_FRAMES[idleFrame]);
}

    
function updateHPBar(currentTime) {
    const hpPercent = hp / maxHP;
    const totalWidth = 1595;

    document.getElementById("hp-green-wrapper").style.width = (hpPercent * 100) + "%";

    const splitX = totalWidth * (1 - hpPercent);

    const pIcon = document.getElementById("icon-player");
    const oIcon = document.getElementById("icon-opponent");

    pIcon.style.left = (splitX - 125 + 100) + "px"; 
    oIcon.style.left = (splitX - 125 - 100) + "px";

    if (hp < 40) {
        pIcon.src = `assets/final/icon${_currentPlayerChar}-dying.png`;
    } else {
        pIcon.src = `assets/final/icon${_currentPlayerChar}-neutral.png`;
    }

    if (hp > 160) {
        oIcon.src = `assets/final/icon${_currentOpponentChar}-dying.png`;
    } else {
        oIcon.src = `assets/final/icon${_currentOpponentChar}-neutral.png`;
    }

    if (_activeSong) {
        const bpm = (_activeSong && _activeSong.bpm) ? _activeSong.bpm : 170;
        const msPerBeat = (60 / bpm) * 1000;
        const beatProgress = (currentTime % msPerBeat) / msPerBeat;

        let bounce = 1.0 - (beatProgress * 0.4); 
        if (bounce < 0.8) bounce = 0.8;

        pIcon.style.transform = `scale(${bounce})`;
        oIcon.style.transform = `scaleX(-${bounce}) scaleY(${bounce})`;
    }
}

    const KEY_MAP = {
    'D': 0, 'ARROWLEFT': 0,
    'F': 1, 'ARROWDOWN': 1,
    'J': 2, 'ARROWUP': 2,
    'K': 3, 'ARROWRIGHT': 3
};

let activeLanes = new Set();

window.addEventListener("keydown", e => {
    const key = e.key.toUpperCase();
    if (KEY_MAP[key] !== undefined) {
        const lane = KEY_MAP[key];
        if (!e.repeat) {
            activeLanes.add(lane);
            checkNoteHit(lane);
        }
    }
});

window.addEventListener("keyup", e => {
    const key = e.key.toUpperCase();
    if (KEY_MAP[key] !== undefined) {
        activeLanes.delete(KEY_MAP[key]);
    }
});

    const HIT_WINDOW = 160;

function checkNoteHit(lane) {
    const currentTime = _inst.currentTime * 1000;
    const notes = document.querySelectorAll(`.note[data-lane="${lane}"][data-isplayer="true"]`);
    
    let hitAny = false;

    notes.forEach(note => {
        const targetTime = parseFloat(note.dataset.time);
        const diff = Math.abs(targetTime - currentTime);

        if (diff < HIT_WINDOW) {
            hp = Math.min(maxHP, hp + 5);
            note.remove();
            document.querySelectorAll(`[data-time="${targetTime}"][data-lane="${lane}"]`).forEach(el => el.remove());
            hitAny = true;
        }
    });
    updateHPBar(currentTime);
}

loadGameData();
